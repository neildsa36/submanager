<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#3b82f6,#9333ea);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

a{
    text-decoration:none;
}
</style>

</head>

<body>

<div class="box">
<h2>Register</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<p>Already have account? <a href="login.html">Login</a></p>
</div>

<script>
function register(){
fetch("http://localhost:3000/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:password.value
})
}).then(()=>{
alert("Registered");
window.location="login.html";
});
}
</script>

</body>
</html>
